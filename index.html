<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Portfolio</title>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap"
            rel="stylesheet" />
    </head>

    <body>
        <!-- This is the main header of the page -->
        <div id="header-container">
            <a href="index.html">
                <h1 id="main-header">Brandon Cartagena</h1>
            </a>
            <div id="linkedin-box">
                <a href="https://www.linkedin.com/in/brancartagena" target="_blank">
                    <img src="images/linkedin-logo.png" alt="LinkedIn" id="linkedin-logo" />
                </a>
            </div>
        </div>

        <!-- The navigation bar -->
        <nav id="navbar">
            <ul>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <!-- Main content area -->
        <main>
            <section class="hero">
                <img
                    id="brandon-image"
                    class="hero-image"
                    src="images/brandon.png"
                    alt="Photo of Brandon Cartagena" />
                <div class="hero-copy">
                    <p class="hero-intro">Hey! I'm Brandon,</p>
                    <p class="hero-description">
                        <span class="hero-highlight">a passionate developer</span>
                        who loves to share my work with the world.
                    </p>
                </div>
            </section>
        </main>
        
        <!-- Featured project carousel -->
        <div class="carousel-container">
            <h2 id="featured-projects-title">Featured Work</h2>
            <div class="carousel">

                <div class="card active" data-index="0">
                    <img src="images/gamerate.png" alt="GameRate project preview">
                    <h3>Project 1</h3>
                </div>

                <div class="card right" data-index="1">
                    <img src="images/tickyaza.png" alt="TickYaza project preview">
                    <h3>Project 2</h3>
                </div>

                <div class="card left" data-index="2">
                    <img src="images/umd_creatives_short.png" alt="UMD Creatives project preview">
                    <h3>Project 3</h3>
                </div>

            </div>
        </div>

        <!-- Site footer -->
        <footer id="footer">
            <p>&copy; 2026 Brandon Cartagena. All rights reserved.</p>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
