<html>

        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Anta&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet" />
    </head>

    <body>
        <!-- This is the main header of the page -->
        <div id="header-container">
            <a href="index.html">

            </a>
            <div id="linkedin-box">
                <a href="https://www.linkedin.com/in/brancartagena" target="_blank">
                    <img src="images/linkedin-logo.png" alt="LinkedIn" id="linkedin-logo" />
                </a>
            </div>
        </div>

        <!-- The navigation bar -->
        <nav id="navbar">
            <ul>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <!-- Main content area -->
        <main>
            <div class="w-full text-center">
                 <img id="brandon-image" style="border-radius:30%; object-fit:cover; object-position:bottom; height:350px; width:350px; overflow:hidden; display:block; margin:100px auto;"
                    onclick="iterateClickCount()" src="../images/brandon.png" alt="Photo of Brandon Cartagena" class="cursor-pointer xl:mt-10 inline-block animate__animated animate__fadeIn

                 <div style="text-align:center; font-size:50px; margin-bottom:100px;">

                     </span>

            </div>

        <div class="carousel-container">
            <h2 id="featured-projects-title">Featured Work</h2>
            <div class="carousel">

                <div class="card active" data-index="0">
                    <img src="../images/gamerate.png">

                </div>

                <div class="card right" data-index="1">
                    <img src="../images/tickyaza.png">
                    <h3>Project 2</h3>
                </div>

                <div class="card left" data-index="2">
                    <img src="../images/umd_creatives_short.png">
